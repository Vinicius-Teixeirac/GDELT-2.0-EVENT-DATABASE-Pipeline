# ================================
#   GDELT PIPELINE CONFIGURATION
#   Copy this file to settings.yaml
#   and adjust the paths as needed.
# ================================

# Columns present in the GDELT Event dataset
columns:
  gdelt_event:
    - GlobalEventID
    - Day
    - MonthYear
    - Year
    - FractionDate
    - Actor1Code
    - Actor1Name
    - Actor1CountryCode
    - Actor1KnownGroupCode
    - Actor1EthnicCode
    - Actor1Religion1Code
    - Actor1Religion2Code
    - Actor1Type1Code
    - Actor1Type2Code
    - Actor1Type3Code
    - Actor2Code
    - Actor2Name
    - Actor2CountryCode
    - Actor2KnownGroupCode
    - Actor2EthnicCode
    - Actor2Religion1Code
    - Actor2Religion2Code
    - Actor2Type1Code
    - Actor2Type2Code
    - Actor2Type3Code
    - IsRootEvent
    - EventCode
    - EventBaseCode
    - EventRootCode
    - QuadClass
    - GoldsteinScale
    - NumMentions
    - NumSources
    - NumArticles
    - AvgTone
    - Actor1Geo_Type
    - Actor1Geo_FullName
    - Actor1Geo_CountryCode
    - Actor1Geo_ADM1Code
    - Actor1Geo_Lat
    - Actor1Geo_Long
    - Actor1Geo_FeatureID
    - Actor2Geo_Type
    - Actor2Geo_FullName
    - Actor2Geo_CountryCode
    - Actor2Geo_ADM1Code
    - Actor2Geo_Lat
    - Actor2Geo_Long
    - Actor2Geo_FeatureID
    - ActionGeo_Type
    - ActionGeo_FullName
    - ActionGeo_CountryCode
    - ActionGeo_ADM1Code
    - ActionGeo_Lat
    - ActionGeo_Long
    - ActionGeo_FeatureID
    - DATEADDED
    - SOURCEURL

# Numeric columns 
columns_numeric:
  - GlobalEventID
  - Day
  - MonthYear
  - Year
  - FractionDate
  - IsRootEvent
  - QuadClass
  - GoldsteinScale
  - NumMentions
  - NumSources
  - NumArticles
  - AvgTone
  - Actor1Geo_Type
  - Actor1Geo_Lat
  - Actor1Geo_Long
  - Actor2Geo_Type
  - Actor2Geo_Lat
  - Actor2Geo_Long
  - ActionGeo_Type
  - ActionGeo_Lat
  - ActionGeo_Long
  - DATEADDED

# ================================
#       DIRECTORY PATHS
# ================================
# The user should customize these.
# Use absolute or relative paths.

paths:
  # Directory where the pipeline will download ZIP files
  downloaded_data_directory: "./path_example/raw_data" # choose your own directory

  # Directory for extracted CSV files
  unzipped_data_directory: "./path_example/csv"

  # Directory for Parquet output
  parquet_data_directory: "./path_example/parquet"

  # Directory for filtered Parquet files
  filtered_data_directory: "./path_example/filtered"

  # Hive-partitioned Parquet for historical files (yearly / monthly ZIPs).
  # Only used when converter.partitioning.enabled is true.
  parquet_historical_directory: "./path_example/parquet_historical"

  # Filtered version of the historical Hive dataset.
  # Only used when converter.partitioning.enabled is true.
  filtered_historical_directory: "./path_example/filtered_historical"

# ================================
#          STAGE SETTINGS
# ================================

scraping:
  retries: 3
  timeout: 30  # seconds

  # Optional: absolute path to chromedriver.exe
  # Set this when automatic download is blocked by a network firewall.
  # Download the matching version from:
  # https://googlechromelabs.github.io/chrome-for-testing/
  chromedriver_path: null

converter:
  keep_unzipped: false
  file_pattern: "*.zip"

  # Optional Hive partitioning for pre-daily (yearly / monthly) source files.
  # When enabled, yearly and monthly ZIPs are written as a Hive-partitioned
  # dataset under parquet_historical_directory instead of flat files.
  # Daily ZIPs (2013-present) always go to parquet_data_directory unchanged.
  partitioning:
    enabled: false
    rules:
      - file_type: yearly    # e.g. 1979.zip
        by: ["Year"]
      - file_type: monthly   # e.g. 200601.zip
        by: ["Year", "MonthYear"]

# The user should customize this.
# Provide columns so the filter drop instances with NAN values on them.
filter:
  columns_to_check: # example
    - GlobalEventID
    - Actor1Name
    - Actor2Name
    - QuadClass
    - Actor1Geo_Lat
    - Actor1Geo_Long
    - Actor2Geo_Lat
    - Actor2Geo_Long
    - ActionGeo_Lat
    - ActionGeo_Long
    - Day
